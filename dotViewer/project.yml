name: dotViewer
options:
  bundleIdPrefix: com.stianlars1
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    DEVELOPMENT_TEAM: "7F5ZSQFCQ4"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    "CODE_SIGN_IDENTITY[sdk=macosx*]": "Apple Development"
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEAD_CODE_STRIPPING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
packages: {}
schemes:
  dotViewer:
    build:
      targets:
        dotViewer: all
    run:
      config: Debug
    test:
      config: Debug
targets:
  dotViewer:
    type: application
    platform: macOS
    sources:
      - App
      - Utilities
    info:
      path: App/Info.plist
      properties:
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.stianlars1.dotviewer.typescript
            UTTypeDescription: TypeScript Source
            UTTypeConformsTo:
              - public.source-code
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - cts
                - ts
          - UTTypeIdentifier: com.stianlars1.dotviewer.env
            UTTypeDescription: Environment Variables
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - env
          - UTTypeIdentifier: com.stianlars1.dotviewer.batch
            UTTypeDescription: Windows Batch Script
            UTTypeConformsTo:
              - public.plain-text
              - public.script
            UTTypeTagSpecification:
              public.filename-extension:
                - bat
                - cmd
          - UTTypeIdentifier: com.stianlars1.dotviewer.jsx
            UTTypeDescription: JavaScript JSX Source
            UTTypeConformsTo:
              - public.source-code
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - jsx
          - UTTypeIdentifier: com.stianlars1.dotviewer.fsharp
            UTTypeDescription: F# Source
            UTTypeConformsTo:
              - public.source-code
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - fs
                - fsx
                - fsi
          - UTTypeIdentifier: com.stianlars1.dotviewer.vb
            UTTypeDescription: Visual Basic Source
            UTTypeConformsTo:
              - public.source-code
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - vb
    entitlements:
      path: App/dotViewer.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.stianlars1.dotViewer.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stianlars1.dotViewer
        DEAD_CODE_STRIPPING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: dotIcon
    resources:
      - path: App/dotIcon.xcassets
    dependencies:
      - target: Shared
      - target: QuickLookExtension
        embed: true
      - target: QuickLookThumbnailExtension
        embed: true
  QuickLookExtension:
    type: app-extension
    platform: macOS
    sources:
      - QuickLookExtension
    info:
      path: QuickLookExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PreviewProvider
          NSExtensionAttributes:
            QLIsDataBasedPreview: true
            QLSupportedContentTypes:
              # Note: Quick Look matching appears to require exact UTType identifiers (not conformance).
              # Keep this list broad for common source/text UTIs, plus `public.data` for dotfiles/unknowns.
              - public.data
              - public.mpeg-2-transport-stream
              - public.plain-text
              - public.text
              - public.source-code
              - public.script
              - public.shell-script
              - public.bash-script
              - public.zsh-script
              - public.ksh-script
              - public.csh-script
              - public.tcsh-script
              - public.python-script
              - public.ruby-script
              - public.perl-script
              - public.php-script
              - public.swift-source
              - com.netscape.javascript-source
              - com.microsoft.typescript
              - com.sun.java-source
              - com.microsoft.c-sharp
              - org.golang.go-script
              - org.rust-lang.rust-script
              - org.kotlinlang.source
              - org.scala-lang.scala-source
              - org.dlang.d-source
              - org.haskell.haskell-script
              - org.lua.lua-source
              - org.julialang.julia
              - org.iso.sql
              - public.c-source
              - public.c-header
              - public.c-plus-plus-source
              - public.c-plus-plus-header
              - public.objective-c-source
              - public.objective-c-plus-plus-source
              - public.assembly-source
              - public.make-source
              - public.protobuf-source
              - net.daringfireball.markdown
              - net.ia.markdown
              - org.asciidoc
              - org.python.restructuredtext
              - org.tug.tex
              - org.orgmode
              - com.textpattern.textile
              - org.clojure
              - public.json
              - public.xml
              - public.yaml
              - public.toml
              - com.apple.property-list
              - com.microsoft.ini
              - com.coteditor.conf
              - com.coteditor.verilog
              - com.apple.log
              - com.apple.rez-source
              - public.html
              - public.xhtml
              - public.css
              - public.svg-image
              - public.comma-separated-values-text
              - public.tab-separated-values-text
              - dev.svelte
              - public.handlebars
              - public.mustache
              - com.fishshell.script
              - com.stianlars1.dotviewer.typescript
              - com.stianlars1.dotviewer.env
              - com.stianlars1.dotviewer.batch
              - com.stianlars1.dotviewer.jsx
              - com.stianlars1.dotviewer.fsharp
              - com.stianlars1.dotviewer.vb
              - org.dartlang.dart
              - public.patch-file
              - org.lua
              - public.pascal-source
              - com.apple.applescript.script
    entitlements:
      path: QuickLookExtension/QuickLookPreview.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.application-groups:
          - group.stianlars1.dotViewer.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stianlars1.dotViewer.QuickLookPreview
        DEAD_CODE_STRIPPING: YES
    dependencies:
      - target: Shared
      - target: HighlightXPC
        embed: true
      - framework: QuickLookUI.framework
  QuickLookThumbnailExtension:
    type: app-extension
    platform: macOS
    sources:
      - QuickLookThumbnailExtension
    info:
      path: QuickLookThumbnailExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.thumbnail
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ThumbnailProvider
          NSExtensionAttributes:
            QLSupportedContentTypes:
              - public.data
              - public.mpeg-2-transport-stream
              - public.plain-text
              - public.text
              - public.source-code
              - public.script
              - public.shell-script
              - public.bash-script
              - public.zsh-script
