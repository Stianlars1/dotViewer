    info:
      path: HighlightXPC/Info.plist
      properties:
        XPCService:
          ServiceType: Application
    entitlements:
      path: HighlightXPC/HighlightXPC.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.stianlars1.dotViewer.shared
    resources:
      - path: HighlightXPC/TreeSitterQueries
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stianlars1.dotViewer.HighlightXPC
        SWIFT_OBJC_BRIDGING_HEADER: HighlightXPC/HighlightXPC-Bridging-Header.h
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        CLANG_CXX_LIBRARY: "libc++"
        DEAD_CODE_STRIPPING: YES
        CLANG_ENABLE_MODULE_VERIFIER: YES
        USE_HEADERMAP: NO
        OTHER_CFLAGS:
          - "$(inherited)"
          - "-Wno-strict-prototypes"
          - "-Wno-shorten-64-to-32"
          - "-Wno-unused-function"
          - "-Wno-uninitialized"
          - "-Wno-conditional-uninitialized"
          - "-Wno-comma"
          - "-Wno-ambiguous-macro"
          - "-Wno-macro-redefined"
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/TreeSitterVendor/tree-sitter/lib/include"
          - "$(SRCROOT)/TreeSitterVendor/tree-sitter-compat"
    dependencies:
      - target: Shared
        embed: true
  Shared:
    type: framework
    platform: macOS
    sources:
      - Shared
    resources:
      - path: Shared/DefaultFileTypes.json
    info:
      path: Shared/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stianlars1.dotViewer.Shared
        DEAD_CODE_STRIPPING: YES
        CLANG_ENABLE_MODULE_VERIFIER: YES

  dotViewerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - dotViewerTests
    dependencies:
      - target: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stianlars1.dotViewer.Tests
        GENERATE_INFOPLIST_FILE: YES
