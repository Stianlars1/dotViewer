              - com.fishshell.script
              - com.stianlars1.dotviewer.typescript
              - com.stianlars1.dotviewer.env
              - com.stianlars1.dotviewer.batch
              - com.stianlars1.dotviewer.jsx
              - com.stianlars1.dotviewer.fsharp
              - com.stianlars1.dotviewer.vb
              - org.dartlang.dart
              - public.patch-file
              - org.lua
              - public.pascal-source
              - com.apple.applescript.script
    entitlements:
      path: QuickLookThumbnailExtension/QuickLookThumbnail.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.application-groups:
          - group.stianlars1.dotViewer.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stianlars1.dotViewer.QuickLookThumbnail
        DEAD_CODE_STRIPPING: YES
    dependencies:
      - target: Shared
      - framework: QuickLookThumbnailing.framework
  HighlightXPC:
    type: xpc-service
    platform: macOS
    sources:
      - HighlightXPC
      - path: TreeSitterVendor/tree-sitter/lib/src
        group: TreeSitterVendor/Core
