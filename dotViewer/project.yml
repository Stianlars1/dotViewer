name: dotViewer
options:
  bundleIdPrefix: com.stianlars1
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    DEVELOPMENT_TEAM: "7F5ZSQFCQ4"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    "CODE_SIGN_IDENTITY[sdk=macosx*]": "Apple Development"
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEAD_CODE_STRIPPING: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
packages: {}
schemes:
  dotViewer:
    build:
      targets:
        dotViewer: all
    run:
      config: Debug
    test:
      config: Debug
  dotViewerTests:
    build:
      targets:
        dotViewerTests: [test]
        Shared: [test]
    test:
      config: Debug
      targets:
        - dotViewerTests
targets:
  dotViewer:
    type: application
    platform: macOS
    sources:
      - App
      - Utilities
    info:
      path: App/Info.plist
