    entitlements:
      path: App/dotViewer.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.stianlars1.dotViewer.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stianlars1.dotViewer
        DEAD_CODE_STRIPPING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: dotViewerIcon
    resources:
      - path: App/dotViewerIcon.xcassets
    dependencies:
      - target: Shared
      - target: QuickLookExtension
        embed: true
      - target: QuickLookThumbnailExtension
        embed: true
  QuickLookExtension:
    type: app-extension
    platform: macOS
    sources:
      - QuickLookExtension
    info:
      path: QuickLookExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PreviewProvider
          NSExtensionAttributes:
            QLIsDataBasedPreview: true
            QLSupportedContentTypes:
              # System UTIs
              - public.ada-source
              - public.assembly-source
              - public.bash-script
              - public.c-header
              - public.c-plus-plus-header
              - public.c-plus-plus-inline-header
              - public.c-plus-plus-source
              - public.c-source
              - public.c-source.preprocessed
              - public.comma-separated-values-text
              - public.csh-script
              - public.css
              - public.data
              - public.fortran-90-source
              - public.fortran-95-source
              - public.fortran-source
              - public.handlebars
              - public.html
              - public.json
              - public.ksh-script
              - public.make-source
              - public.mpeg-2-transport-stream
              - public.mustache
              - public.ndjson
              - public.objective-c-plus-plus-source
              - public.objective-c-source
              - public.pascal-source
              - public.patch-file
              - public.perl-script
              - public.php-script
              - public.plain-text
              - public.protobuf-source
              - public.python-script
              - public.rss
              - public.ruby-script
              - public.script
              - public.shell-script
              - public.source-code
              - public.svg-image
              - public.swift-source
              - public.tab-separated-values-text
              - public.tcsh-script
              - public.text
              - public.toml
              - public.xhtml
              - public.xml
              - public.yacc-source
              - public.yaml
              - public.zsh-script
              # Vendor UTIs (com.*)
              - com.adobe.postscript
              - com.apple.applescript.script
              - com.apple.log
              - com.apple.mobileconfig
              - com.apple.property-list
              - com.apple.rez-source
