      - generic [ref=e248]:
        - generic [ref=e249]:
          - generic [ref=e250]:
            - generic [ref=e251]: Coverage and limits
            - heading "Broad enough to replace several niche preview tools, honest enough to say where macOS still wins." [level=2] [ref=e252]
            - paragraph [ref=e253]: dotViewer is strongest where Finder gives third-party Quick Look extensions room to improve the experience. When macOS owns the preview path, the limitation is stated directly instead of hidden behind vague marketing claims.
          - list [ref=e254]:
            - listitem [ref=e255]:
              - text: Some file types are still claimed by macOS system preview handlers. For example,
              - code [ref=e256]: .html
              - text: stays with the native HTML Quick Look renderer.
            - listitem [ref=e257]:
              - text: TypeScript
              - code [ref=e258]: .ts
              - text: can still be routed by macOS as MPEG-2 transport stream video in some situations, which is a platform routing limitation rather than a dotViewer bug.
            - listitem [ref=e259]: dotViewer improves Quick Look where third-party extensions are allowed. It does not override every system-owned preview path in macOS.
        - generic [ref=e260]:
          - generic [ref=e261]:
            - generic [ref=e262]: Custom mappings
            - heading "Be explicit about what users can map themselves." [level=2] [ref=e263]
            - paragraph [ref=e264]: dotViewer does support custom mappings in the app, but only for file types the shipped extension already routes. Sorry, but dotViewer cannot teach macOS Quick Look completely brand-new file types at runtime.
            - paragraph [ref=e265]: Everything in the accordion below is already shipped today. Most of it routes directly to dotViewer in Finder Quick Look, but a small number of mappings still stay with macOS system previewers and are marked inline. If a type is missing from that list, users will not be able to add it themselves until a future shipped dotViewer version includes it.
