<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <!-- Top highlight -->
    <linearGradient id="highlight" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Glass lens gradient -->
    <radialGradient id="lensGrad" cx="0.35" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.12"/>
    </radialGradient>
    <!-- Handle gradient -->
    <linearGradient id="handleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.65"/>
    </linearGradient>
    <!-- Accent line glow -->
    <filter id="accentGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Shadow for magnifier -->
    <filter id="magShadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <!-- Lens highlight -->
    <filter id="lensHighlight">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#fff" flood-opacity="0.08"/>
    </filter>
    <!-- Squircle clip (approximate) -->
    <clipPath id="squircle">
      <path d="M512 0C708 0 800 0 868 36C924 66 960 100 988 156C1024 224 1024 316 1024 512C1024 708 1024 800 988 868C960 924 924 960 868 988C800 1024 708 1024 512 1024C316 1024 224 1024 156 988C100 960 66 924 36 868C0 800 0 708 0 512C0 316 0 224 36 156C66 100 100 66 156 36C224 0 316 0 512 0Z"/>
    </clipPath>
  </defs>

  <!-- Squircle background -->
  <g clip-path="url(#squircle)">
    <!-- Main background -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Subtle top highlight for depth -->
    <ellipse cx="512" cy="0" rx="600" ry="520" fill="url(#highlight)"/>

    <!-- Background code lines (very subtle) -->
    <g opacity="0.07">
      <rect x="120" y="140" width="260" height="18" rx="9" fill="white"/>
      <rect x="120" y="185" width="380" height="18" rx="9" fill="white"/>
      <rect x="120" y="230" width="300" height="18" rx="9" fill="white"/>
      <rect x="120" y="275" width="420" height="18" rx="9" fill="white"/>
      <rect x="120" y="320" width="240" height="18" rx="9" fill="white"/>
      <rect x="120" y="365" width="360" height="18" rx="9" fill="white"/>
      <rect x="120" y="410" width="400" height="18" rx="9" fill="white"/>
      <rect x="120" y="455" width="200" height="18" rx="9" fill="white"/>
      <rect x="120" y="500" width="340" height="18" rx="9" fill="white"/>
      <rect x="120" y="545" width="280" height="18" rx="9" fill="white"/>
      <rect x="120" y="590" width="380" height="18" rx="9" fill="white"/>
      <rect x="120" y="635" width="320" height="18" rx="9" fill="white"/>
      <rect x="120" y="680" width="250" height="18" rx="9" fill="white"/>
      <rect x="120" y="725" width="360" height="18" rx="9" fill="white"/>
      <rect x="120" y="770" width="290" height="18" rx="9" fill="white"/>
      <rect x="120" y="815" width="400" height="18" rx="9" fill="white"/>
    </g>

    <!-- Magnifying glass group -->
    <g filter="url(#magShadow)">
      <!-- Handle -->
      <g transform="translate(512, 512) rotate(45) translate(-512, -512)">
        <rect x="678" y="498" width="170" height="48" rx="24" fill="url(#handleGrad)"/>
      </g>

      <!-- Lens outer ring -->
      <circle cx="460" cy="460" r="225" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="32"/>

      <!-- Lens inner fill (glass effect) -->
      <circle cx="460" cy="460" r="209" fill="url(#lensGrad)"/>

      <!-- Lens specular highlight -->
      <ellipse cx="410" cy="400" rx="60" ry="32" fill="white" opacity="0.15" transform="rotate(-25, 410, 400)"/>

      <!-- Code lines inside lens -->
      <g>
        <!-- Line 1 -->
        <rect x="368" y="388" width="120" height="14" rx="7" fill="white" opacity="0.5"/>
        <!-- Line 2 (highlighted/accent) -->
        <rect x="380" y="418" width="170" height="14" rx="7" fill="#a78bfa" opacity="0.85" filter="url(#accentGlow)"/>
        <!-- Line 3 -->
        <rect x="380" y="448" width="140" height="14" rx="7" fill="white" opacity="0.5"/>
        <!-- Line 4 -->
        <rect x="368" y="478" width="100" height="14" rx="7" fill="white" opacity="0.5"/>
        <!-- Line 5 -->
        <rect x="356" y="508" width="130" height="14" rx="7" fill="white" opacity="0.35"/>
      </g>
    </g>

    <!-- Subtle inner shadow at bottom -->
    <rect y="800" width="1024" height="224" fill="url(#highlight)" opacity="0.5" transform="rotate(180, 512, 912)"/>
  </g>
</svg>