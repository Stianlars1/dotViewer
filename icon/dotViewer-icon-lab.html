<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dotViewer Icon Lab</title>
<style>
:root {
  --bg: #0f0f17;
  --surface: #1a1a28;
  --surface2: #22223a;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --text: #e8e8f0;
  --text2: #888899;
  --accent: #7c5cfc;
  --accent2: #a78bfa;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; user-select: none; }

/* Top Bar */
.topbar { height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; z-index: 10; }
.topbar .logo { font-size: 15px; font-weight: 700; background: linear-gradient(135deg, #7c5cfc, #00c6ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.3px; }
.topbar .sep { width: 1px; height: 24px; background: var(--border2); }
.tab-group { display: flex; gap: 2px; background: rgba(255,255,255,0.04); border-radius: 8px; padding: 3px; }
.tab-btn { padding: 6px 16px; border-radius: 6px; border: none; background: transparent; color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.tab-btn.active { background: var(--accent); color: white; }
.tab-btn:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.06); }
.topbar .spacer { flex: 1; }
.export-btn { padding: 7px 18px; border-radius: 8px; border: 1px solid var(--accent); background: rgba(124,92,252,0.15); color: var(--accent2); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; }
.export-btn:hover { background: var(--accent); color: white; }

/* Main Layout */
.main { flex: 1; display: flex; overflow: hidden; }
.left-panel { width: 280px; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; background: var(--surface); }
.center-panel { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background: var(--bg); overflow: hidden; }
.right-panel { width: 260px; border-left: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; background: var(--surface); padding: 20px; }

/* Left Panel: Gallery */
.panel-header { padding: 16px 16px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); }
.preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 12px 16px; }
.preset-card { background: var(--surface2); border: 2px solid transparent; border-radius: 12px; cursor: pointer; transition: all 0.2s; overflow: hidden; position: relative; }
.preset-card:hover { border-color: rgba(124,92,252,0.3); transform: translateY(-2px); }
.preset-card.active { border-color: var(--accent); box-shadow: 0 0 20px rgba(124,92,252,0.2); }
.preset-card svg { width: 100%; aspect-ratio: 1; display: block; }
.preset-card .preset-name { font-size: 11px; font-weight: 500; text-align: center; padding: 6px 4px 8px; color: var(--text2); }
.preset-card.active .preset-name { color: var(--accent2); }
.preset-badge { position: absolute; top: 6px; right: 6px; font-size: 8px; font-weight: 600; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.preset-badge.apple { background: rgba(0,122,255,0.2); color: #5ac8fa; }
.preset-badge.original { background: rgba(124,92,252,0.2); color: #a78bfa; }
.preset-badge.liquid { background: linear-gradient(135deg, rgba(0,210,255,0.2), rgba(124,92,252,0.2)); color: #00d4ff; border: 1px solid rgba(0,210,255,0.15); }
.preset-badge.hig { background: linear-gradient(135deg, rgba(255,183,77,0.25), rgba(255,111,0,0.2)); color: #ffb74d; border: 1px solid rgba(255,183,77,0.2); }
.preset-badge.guide { background: linear-gradient(135deg, rgba(88,166,255,0.25), rgba(56,100,220,0.2)); color: #58a6ff; border: 1px solid rgba(88,166,255,0.25); }
.preset-badge.system { background: linear-gradient(135deg, rgba(120,144,169,0.2), rgba(90,123,154,0.15)); color: #7890A9; border: 1px solid rgba(120,144,169,0.2); }
.preset-badge.concept { background: linear-gradient(135deg, rgba(129,140,248,0.25), rgba(99,102,241,0.2)); color: #818cf8; border: 1px solid rgba(129,140,248,0.2); }
.preset-badge.dotviewer { background: linear-gradient(135deg, rgba(167,139,250,0.25), rgba(139,92,246,0.2)); color: #a78bfa; border: 1px solid rgba(167,139,250,0.2); }

/* Filter Tabs */
.filter-tabs { display: flex; gap: 4px; padding: 4px 12px 8px; }
.filter-tab { padding: 4px 10px; border-radius: 12px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-size: 11px; font-weight: 500; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.filter-tab.active { background: var(--accent); border-color: var(--accent); color: white; }
.filter-tab:hover:not(.active) { border-color: var(--accent); color: var(--accent2); }
.filter-count { font-size: 9px; opacity: 0.6; margin-left: 2px; }

/* Left Panel: Assets */
.asset-category { padding: 6px 16px; font-size: 11px; font-weight: 600; color: var(--accent2); }
.asset-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 4px 12px 12px; }
.asset-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; cursor: grab; transition: all 0.15s; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; padding: 6px; }
.asset-item:hover { border-color: var(--accent); background: rgba(124,92,252,0.08); transform: scale(1.05); }
.asset-item:active { cursor: grabbing; transform: scale(0.95); }
.asset-item svg { width: 36px; height: 36px; }
.asset-item .aname { font-size: 8px; color: var(--text2); text-align: center; line-height: 1.2; }

/* Canvas */
.canvas-area { position: relative; }
.canvas-wrap { width: 420px; height: 420px; position: relative; border-radius: 20px; }
.canvas-bg { position: absolute; inset: -40px; background: radial-gradient(circle at center, rgba(124,92,252,0.06), transparent 70%); pointer-events: none; }
#icon-canvas { width: 420px; height: 420px; cursor: default; filter: drop-shadow(0 12px 40px rgba(0,0,0,0.5)); }
.canvas-size-label { position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--text2); }

/* Right Panel */
.prop-section { margin-bottom: 20px; }
.prop-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text2); margin-bottom: 10px; }
.prop-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.prop-row label { font-size: 12px; color: var(--text2); width: 64px; flex-shrink: 0; }
.prop-row input[type="range"] { flex: 1; accent-color: var(--accent); height: 4px; }
.prop-row input[type="color"] { width: 32px; height: 28px; border: 1px solid var(--border2); border-radius: 6px; cursor: pointer; background: transparent; padding: 2px; }
.prop-row .val { font-size: 11px; color: var(--text2); width: 36px; text-align: right; font-family: 'SF Mono', monospace; }
.prop-row input[type="number"] { width: 56px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); padding: 4px 6px; font-size: 12px; font-family: inherit; text-align: center; }
.prop-row input[type="number"]:focus { outline: none; border-color: var(--accent); }
.btn-row { display: flex; gap: 6px; margin-top: 12px; }
.btn-sm { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border2); background: var(--surface2); color: var(--text2); font-size: 11px; font-weight: 500; cursor: pointer; font-family: inherit; transition: all 0.15s; flex: 1; text-align: center; }
.btn-sm:hover { border-color: var(--accent); color: var(--accent2); }
.btn-sm.danger:hover { border-color: #f43f5e; color: #f43f5e; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 13px; line-height: 1.6; }
.empty-state .icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
.sel-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-right: 6px; }
.layer-list { display: flex; flex-direction: column; gap: 4px; }
.layer-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--surface2); border: 1px solid transparent; border-radius: 6px; font-size: 12px; color: var(--text2); cursor: pointer; transition: all 0.15s; }
.layer-item:hover { border-color: var(--border2); }
.layer-item.selected { border-color: var(--accent); color: var(--text); background: rgba(124,92,252,0.1); }
.layer-item .li-icon { width: 20px; height: 20px; flex-shrink: 0; }
.layer-item .li-name { flex: 1; }
.layer-item .li-vis { opacity: 0.4; cursor: pointer; font-size: 14px; }
.layer-item .li-vis:hover { opacity: 1; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

/* Drag ghost */
.drag-ghost { position: fixed; pointer-events: none; z-index: 1000; opacity: 0.8; }

/* Minimap sizes */
.size-strip { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; align-items: flex-end; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 20px; }
.size-item { text-align: center; }
.size-item svg { display: block; margin: 0 auto 4px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
.size-item span { font-size: 9px; color: var(--text2); }

/* Selection handles on canvas */
.sel-rect { fill: none; stroke: var(--accent); stroke-width: 1.5; stroke-dasharray: 4 3; pointer-events: none; }
.sel-handle { fill: var(--accent); stroke: white; stroke-width: 1.5; cursor: move; }

/* Gradient angle vis */
.angle-vis { width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--border2); position: relative; margin: 8px auto; cursor: pointer; }
.angle-line { position: absolute; top: 50%; left: 50%; width: 50%; height: 2px; background: var(--accent); transform-origin: left center; border-radius: 1px; }
.angle-dot { position: absolute; width: 8px; height: 8px; background: white; border-radius: 50%; transform: translate(-50%, -50%); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">dotViewer Icon Lab</div>
  <div class="sep"></div>
  <div class="tab-group">
    <button class="tab-btn active" onclick="setMode('gallery')">Gallery</button>
    <button class="tab-btn" onclick="setMode('studio')">Studio</button>
  </div>
  <div class="spacer"></div>
  <button class="export-btn" onclick="exportPNG()">Export PNG 1024px</button>
  <button class="export-btn" onclick="exportSVG()" style="margin-left:4px">Export SVG</button>
</div>

<div class="main">
  <div class="left-panel" id="leftPanel"></div>
  <div class="center-panel">
    <div class="canvas-bg"></div>
    <div class="canvas-area">
      <div class="canvas-wrap">
        <svg id="icon-canvas" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="squircle-clip">
              <path d="M256 0C354 0 400 0 434 18C462 33 480 50 494 78C512 112 512 158 512 256C512 354 512 400 494 434C480 462 462 480 434 494C400 512 354 512 256 512C158 512 112 512 78 494C50 480 33 462 18 434C0 400 0 354 0 256C0 158 0 112 18 78C33 50 50 33 78 18C112 0 158 0 256 0Z"/>
            </clipPath>
            <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#3730a3"/><stop offset="100%" stop-color="#6366f1"/></linearGradient>
            <linearGradient id="highlight-grad" x1="0.5" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="white" stop-opacity="0.12"/><stop offset="100%" stop-color="white" stop-opacity="0"/></linearGradient>
            <radialGradient id="lens-grad" cx="0.35" cy="0.35" r="0.65"><stop offset="0%" stop-color="white" stop-opacity="0.1"/><stop offset="100%" stop-color="black" stop-opacity="0.1"/></radialGradient>
            <filter id="shadow1"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.3"/></filter>
            <filter id="glow1"><feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="glow2"><feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            <filter id="softshadow"><feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.18"/></filter>
          </defs>
          <g clip-path="url(#squircle-clip)" id="canvas-content"></g>
          <g id="selection-overlay"></g>
        </svg>
      </div>
    </div>
    <div class="size-strip" id="sizeStrip"></div>
  </div>
  <div class="right-panel" id="rightPanel"></div>
</div>

<canvas id="export-canvas" width="1024" height="1024" style="display:none"></canvas>

<script>
// ============================================================
// STATE
// ============================================================
const S = {
  mode: 'gallery',
  preset: 0,
  elements: [],
  selectedId: null,
  bg: { c1: '#3730a3', c2: '#6366f1', angle: 145 },
  nextId: 1,
  dragging: null,
  dragOffset: { x: 0, y: 0 },
  galleryFilter: 'all'
};

// ============================================================
// ASSET DEFINITIONS
// ============================================================
const ASSETS = [
  // --- Lenses ---
  { id: 'mag_bold', name: 'Magnifier Bold', cat: 'Lenses', w: 120, h: 120,
    svg: c => `<circle cx="45" cy="45" r="38" stroke="${c}" stroke-width="9" fill="none"/><line x1="72" y1="72" x2="105" y2="105" stroke="${c}" stroke-width="9" stroke-linecap="round"/>` },
  { id: 'mag_thin', name: 'Magnifier Thin', cat: 'Lenses', w: 120, h: 120,
    svg: c => `<circle cx="45" cy="45" r="38" stroke="${c}" stroke-width="4" fill="none"/><line x1="72" y1="72" x2="105" y2="105" stroke="${c}" stroke-width="4" stroke-linecap="round"/>` },
  { id: 'mag_filled', name: 'Magnifier Glass', cat: 'Lenses', w: 120, h: 120,
    svg: c => `<circle cx="45" cy="45" r="38" stroke="${c}" stroke-width="7" fill="${c}" fill-opacity="0.1"/><ellipse cx="34" cy="34" rx="16" ry="9" fill="${c}" fill-opacity="0.12" transform="rotate(-20,34,34)"/><line x1="72" y1="72" x2="105" y2="105" stroke="${c}" stroke-width="7" stroke-linecap="round"/>` },
  { id: 'eye_open', name: 'Eye Open', cat: 'Lenses', w: 100, h: 60,
    svg: c => `<path d="M5 30C5 30 25 5 50 5C75 5 95 30 95 30C95 30 75 55 50 55C25 55 5 30 5 30Z" stroke="${c}" stroke-width="4" fill="none"/><circle cx="50" cy="30" r="12" stroke="${c}" stroke-width="3" fill="none"/><circle cx="50" cy="30" r="5" fill="${c}"/>` },
  { id: 'eye_minimal', name: 'Eye Simple', cat: 'Lenses', w: 80, h: 50,
    svg: c => `<path d="M4 25Q40 0 76 25Q40 50 4 25Z" stroke="${c}" stroke-width="3" fill="none"/><circle cx="40" cy="25" r="8" fill="${c}"/>` },
  { id: 'lens_ring', name: 'Lens Ring', cat: 'Lenses', w: 80, h: 80,
    svg: c => `<circle cx="40" cy="40" r="34" stroke="${c}" stroke-width="6" fill="none"/><circle cx="40" cy="40" r="22" stroke="${c}" stroke-width="2" fill="none" opacity="0.4"/>` },

  // --- Brackets ---
  { id: 'curly', name: 'Curly { }', cat: 'Brackets', w: 100, h: 80,
    svg: c => `<text x="10" y="62" font-family="SF Mono,Menlo,monospace" font-size="64" font-weight="300" fill="${c}">{</text><text x="58" y="62" font-family="SF Mono,Menlo,monospace" font-size="64" font-weight="300" fill="${c}">}</text>` },
  { id: 'angle', name: 'Angle < >', cat: 'Brackets', w: 100, h: 80,
    svg: c => `<text x="5" y="62" font-family="SF Mono,Menlo,monospace" font-size="64" font-weight="300" fill="${c}">&lt;</text><text x="55" y="62" font-family="SF Mono,Menlo,monospace" font-size="64" font-weight="300" fill="${c}">&gt;</text>` },
  { id: 'square', name: 'Square [ ]', cat: 'Brackets', w: 90, h: 80,
    svg: c => `<text x="8" y="62" font-family="SF Mono,Menlo,monospace" font-size="64" font-weight="300" fill="${c}">[</text><text x="50" y="62" font-family="SF Mono,Menlo,monospace" font-size="64" font-weight="300" fill="${c}">]</text>` },
  { id: 'tag', name: 'Tag < />', cat: 'Brackets', w: 110, h: 70,
    svg: c => `<text x="5" y="54" font-family="SF Mono,Menlo,monospace" font-size="52" font-weight="300" fill="${c}">&lt;/&gt;</text>` },
  { id: 'dbl_curly', name: 'Double {{ }}', cat: 'Brackets', w: 120, h: 80,
    svg: c => `<text x="2" y="62" font-family="SF Mono,Menlo,monospace" font-size="48" font-weight="300" fill="${c}">{{</text><text x="66" y="62" font-family="SF Mono,Menlo,monospace" font-size="48" font-weight="300" fill="${c}">}}</text>` },
  { id: 'parens', name: 'Parens ( )', cat: 'Brackets', w: 90, h: 80,
    svg: c => `<text x="8" y="62" font-family="SF Mono,Menlo,monospace" font-size="64" font-weight="300" fill="${c}">(</text><text x="50" y="62" font-family="SF Mono,Menlo,monospace" font-size="64" font-weight="300" fill="${c}">)</text>` },

  // --- Characters ---
  { id: 'dot_char', name: 'Dot .', cat: 'Characters', w: 40, h: 60,
    svg: c => `<circle cx="20" cy="48" r="8" fill="${c}"/>` },
  { id: 'dot_glow', name: 'Dot Glow', cat: 'Characters', w: 40, h: 40,
    svg: c => `<circle cx="20" cy="20" r="12" fill="${c}" opacity="0.2" filter="url(#glow2)"/><circle cx="20" cy="20" r="6" fill="${c}"/>` },
  { id: 'hash_char', name: 'Hash #', cat: 'Characters', w: 60, h: 70,
    svg: c => `<text x="5" y="56" font-family="SF Mono,Menlo,monospace" font-size="60" font-weight="600" fill="${c}">#</text>` },
  { id: 'arrow_fn', name: 'Arrow =>', cat: 'Characters', w: 80, h: 50,
    svg: c => `<text x="5" y="40" font-family="SF Mono,Menlo,monospace" font-size="44" font-weight="400" fill="${c}">=&gt;</text>` },
  { id: 'cursor', name: 'Cursor |', cat: 'Characters', w: 20, h: 70,
    svg: c => `<rect x="7" y="4" width="3" height="60" rx="1.5" fill="${c}"/>` },
  { id: 'semicolon', name: 'Semicolon ;', cat: 'Characters', w: 30, h: 60,
    svg: c => `<text x="2" y="48" font-family="SF Mono,Menlo,monospace" font-size="52" font-weight="400" fill="${c}">;</text>` },
  { id: 'slash', name: 'Slash /', cat: 'Characters', w: 40, h: 70,
    svg: c => `<text x="2" y="56" font-family="SF Mono,Menlo,monospace" font-size="60" font-weight="300" fill="${c}">/</text>` },
  { id: 'prompt', name: 'Prompt >_', cat: 'Characters', w: 90, h: 50,
    svg: c => `<text x="4" y="38" font-family="SF Mono,Menlo,monospace" font-size="40" font-weight="500" fill="${c}">&gt;_</text>` },

  // --- Code ---
  { id: 'line1', name: 'Code Line', cat: 'Code', w: 100, h: 10,
    svg: c => `<rect x="0" y="2" width="100" height="6" rx="3" fill="${c}"/>` },
  { id: 'lines3', name: '3 Lines', cat: 'Code', w: 100, h: 40,
    svg: c => `<rect x="0" y="2" width="65" height="5" rx="2.5" fill="${c}" opacity="0.7"/><rect x="8" y="14" width="85" height="5" rx="2.5" fill="${c}" opacity="0.7"/><rect x="8" y="26" width="55" height="5" rx="2.5" fill="${c}" opacity="0.7"/>` },
  { id: 'lines5', name: '5 Lines', cat: 'Code', w: 100, h: 60,
    svg: c => `<rect x="0" y="2" width="60" height="5" rx="2.5" fill="${c}" opacity="0.5"/><rect x="8" y="14" width="80" height="5" rx="2.5" fill="${c}" opacity="0.5"/><rect x="8" y="26" width="50" height="5" rx="2.5" fill="${c}" opacity="0.5"/><rect x="0" y="38" width="70" height="5" rx="2.5" fill="${c}" opacity="0.5"/><rect x="8" y="50" width="90" height="5" rx="2.5" fill="${c}" opacity="0.5"/>` },
  { id: 'highlight_line', name: 'Highlight Line', cat: 'Code', w: 120, h: 14,
    svg: c => `<rect x="0" y="2" width="120" height="10" rx="5" fill="${c}" filter="url(#glow1)"/>` },
  { id: 'code_block', name: 'Code Block', cat: 'Code', w: 100, h: 80,
    svg: c => `<rect x="0" y="2" width="50" height="4" rx="2" fill="${c}" opacity="0.5"/><rect x="10" y="14" width="70" height="4" rx="2" fill="${c}" opacity="0.5"/><rect x="10" y="26" width="45" height="4" rx="2" fill="${c}" opacity="0.5"/><rect x="20" y="38" width="60" height="4" rx="2" fill="${c}" opacity="0.8"/><rect x="20" y="50" width="40" height="4" rx="2" fill="${c}" opacity="0.5"/><rect x="10" y="62" width="55" height="4" rx="2" fill="${c}" opacity="0.5"/><rect x="0" y="74" width="35" height="4" rx="2" fill="${c}" opacity="0.5"/>` },

  // --- Shapes ---
  { id: 'doc_page', name: 'Document', cat: 'Shapes', w: 80, h: 100,

// ============================================================
// RENDERING
// ============================================================
function getAsset(id) { return ASSETS.find(a => a.id === id); }

function renderAssetSVG(assetId, color) {
  const a = getAsset(assetId);
  return a ? a.svg(color || '#ffffff') : '';
}

function renderElementSVG(el) {
  const a = getAsset(el.type);
  if (!a) return '';
  const tx = el.x || 0, ty = el.y || 0, sc = el.scale || 1, op = el.opacity ?? 1, rot = el.rot || 0;
  const svg = a.svg(el.color || '#ffffff');
  return `<g transform="translate(${tx},${ty}) rotate(${rot},${a.w*sc/2},${a.h*sc/2}) scale(${sc})" opacity="${op}" data-id="${el.id || ''}">${svg}</g>`;
}

function renderBG(bg) {
  const angle = (bg.angle || 145) * Math.PI / 180;
  const x1 = 0.5 - Math.cos(angle) * 0.5, y1 = 0.5 - Math.sin(angle) * 0.5;
  const x2 = 0.5 + Math.cos(angle) * 0.5, y2 = 0.5 + Math.sin(angle) * 0.5;
  return `<linearGradient id="bg-grad" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"><stop offset="0%" stop-color="${bg.c1}"/><stop offset="100%" stop-color="${bg.c2}"/></linearGradient>`;
}

function renderCanvas() {
  const cc = document.getElementById('canvas-content');
  const defs = document.querySelector('#icon-canvas defs');
  const oldGrad = defs.querySelector('#bg-grad');
  const tmp = document.createElementNS('http://www.w3.org/2000/svg','g');
  tmp.innerHTML = renderBG(S.bg);
  if (oldGrad) oldGrad.replaceWith(tmp.firstChild);

  let html = `<rect width="512" height="512" fill="url(#bg-grad)"/>`;
  html += `<ellipse cx="256" cy="0" rx="320" ry="260" fill="white" opacity="0.08"/>`;
  S.elements.forEach(el => { html += renderElementSVG(el); });
  cc.innerHTML = html;
  renderSelection();
  renderSizeStrip();
}

function renderSelection() {
  const ov = document.getElementById('selection-overlay');
  if (!S.selectedId) { ov.innerHTML = ''; return; }
  const el = S.elements.find(e => e.id === S.selectedId);
  if (!el) { ov.innerHTML = ''; return; }
  const a = getAsset(el.type);
  if (!a) return;
  const w = a.w * (el.scale||1), h = a.h * (el.scale||1);
  const pad = 6;
  ov.innerHTML = `<rect x="${el.x-pad}" y="${el.y-pad}" width="${w+pad*2}" height="${h+pad*2}" rx="4" class="sel-rect"/>`;
}

function renderSizeStrip() {
  const svg = document.getElementById('icon-canvas');
  const sizes = [64, 48, 32, 16];
  let html = '';
  sizes.forEach(s => {
    html += `<div class="size-item"><svg width="${s}" height="${s}" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">${svg.querySelector('defs').outerHTML}<g clip-path="url(#squircle-clip)">${document.getElementById('canvas-content').innerHTML}</g></svg><span>${s}px</span></div>`;
  });
  document.getElementById('sizeStrip').innerHTML = html;
}

// ============================================================
// PRESET THUMBNAILS
// ============================================================
function pid(p,i) { return 'p' + i; }
function presetThumbSVG(p, idx) {
  const k = pid(p,idx);
  const angle = (p.bg.angle || 145) * Math.PI / 180;
  const x1 = 0.5 - Math.cos(angle) * 0.5, y1 = 0.5 - Math.sin(angle) * 0.5;
  const x2 = 0.5 + Math.cos(angle) * 0.5, y2 = 0.5 + Math.sin(angle) * 0.5;
  let html = `<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">`;
  html += `<defs><linearGradient id="bg-${k}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"><stop offset="0%" stop-color="${p.bg.c1}"/><stop offset="100%" stop-color="${p.bg.c2}"/></linearGradient>`;
  html += `<filter id="gl-${k}"><feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  html += `<filter id="gl2-${k}"><feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  html += `<clipPath id="sq-${k}"><path d="M256 0C354 0 400 0 434 18C462 33 480 50 494 78C512 112 512 158 512 256C512 354 512 400 494 434C480 462 462 480 434 494C400 512 354 512 256 512C158 512 112 512 78 494C50 480 33 462 18 434C0 400 0 354 0 256C0 158 0 112 18 78C33 50 50 33 78 18C112 0 158 0 256 0Z"/></clipPath></defs>`;
  html += `<g clip-path="url(#sq-${k})">`;
  html += `<rect width="512" height="512" fill="url(#bg-${k})"/>`;
  html += `<ellipse cx="256" cy="0" rx="320" ry="260" fill="white" opacity="0.08"/>`;
  p.els.forEach(el => {
    const a = getAsset(el.type);
    if (!a) return;
    const tx = el.x||0, ty = el.y||0, sc = el.scale||1, op = el.opacity??1, rot = el.rot||0;
    let svgContent = a.svg(el.color || '#ffffff');
    svgContent = svgContent.replace(/filter="url\(#glow1\)"/g, `filter="url(#gl-${k})"`);
    svgContent = svgContent.replace(/filter="url\(#glow2\)"/g, `filter="url(#gl2-${k})"`);
    html += `<g transform="translate(${tx},${ty}) rotate(${rot},${a.w*sc/2},${a.h*sc/2}) scale(${sc})" opacity="${op}">${svgContent}</g>`;
  });
  html += `</g></svg>`;
  return html;
}

// ============================================================
// LEFT PANEL
// ============================================================
function renderLeftPanel() {
  const panel = document.getElementById('leftPanel');
  if (S.mode === 'gallery') {
    const origCount = PRESETS.filter(p => p.group === 'original').length;
    const appleCount = PRESETS.filter(p => p.group === 'apple').length;
    const liquidCount = PRESETS.filter(p => p.group === 'liquid').length;
    const higCount = PRESETS.filter(p => p.group === 'hig').length;
    const guideCount = PRESETS.filter(p => p.group === 'guide').length;
    const systemCount = PRESETS.filter(p => p.group === 'system').length;
    const conceptCount = PRESETS.filter(p => p.group === 'concept').length;
    const dotviewerCount = PRESETS.filter(p => p.group === 'dotviewer').length;
    let html = '<div class="panel-header">Presets</div>';
    html += '<div class="filter-tabs">';
    html += `<button class="filter-tab ${S.galleryFilter==='all'?'active':''}" onclick="setGalleryFilter('all')">All<span class="filter-count"> ${PRESETS.length}</span></button>`;
    html += `<button class="filter-tab ${S.galleryFilter==='original'?'active':''}" onclick="setGalleryFilter('original')">Original<span class="filter-count"> ${origCount}</span></button>`;
    html += `<button class="filter-tab ${S.galleryFilter==='apple'?'active':''}" onclick="setGalleryFilter('apple')">Apple<span class="filter-count"> ${appleCount}</span></button>`;
    html += `<button class="filter-tab ${S.galleryFilter==='liquid'?'active':''}" onclick="setGalleryFilter('liquid')">Liquid<span class="filter-count"> ${liquidCount}</span></button>`;
    html += `<button class="filter-tab ${S.galleryFilter==='hig'?'active':''}" onclick="setGalleryFilter('hig')">HIG<span class="filter-count"> ${higCount}</span></button>`;
    html += `<button class="filter-tab ${S.galleryFilter==='guide'?'active':''}" onclick="setGalleryFilter('guide')">Guide<span class="filter-count"> ${guideCount}</span></button>`;
    html += `<button class="filter-tab ${S.galleryFilter==='system'?'active':''}" onclick="setGalleryFilter('system')">System<span class="filter-count"> ${systemCount}</span></button>`;
    html += `<button class="filter-tab ${S.galleryFilter==='concept'?'active':''}" onclick="setGalleryFilter('concept')">Concept<span class="filter-count"> ${conceptCount}</span></button>`;
    html += `<button class="filter-tab ${S.galleryFilter==='dotviewer'?'active':''}" onclick="setGalleryFilter('dotviewer')">dotViewer<span class="filter-count"> ${dotviewerCount}</span></button>`;
    html += '</div>';
    html += '<div class="preset-grid">';
    PRESETS.forEach((p, i) => {
      if (S.galleryFilter !== 'all' && p.group !== S.galleryFilter) return;
      const badge = p.group === 'apple' ? '<span class="preset-badge apple">Apple</span>' : p.group === 'liquid' ? '<span class="preset-badge liquid">Liquid</span>' : p.group === 'hig' ? '<span class="preset-badge hig">HIG</span>' : p.group === 'guide' ? '<span class="preset-badge guide">Guide</span>' : p.group === 'system' ? '<span class="preset-badge system">System</span>' : p.group === 'concept' ? '<span class="preset-badge concept">Concept</span>' : p.group === 'dotviewer' ? '<span class="preset-badge dotviewer">dV</span>' : '';
      html += `<div class="preset-card ${S.preset===i?'active':''}" onclick="loadPreset(${i})">${badge}${presetThumbSVG(p,i)}<div class="preset-name">${p.name}</div></div>`;
    });
    html += '</div>';
    panel.innerHTML = html;
  } else {
    let html = '';
    const cats = [...new Set(ASSETS.map(a => a.cat))];
    cats.forEach(cat => {
      html += `<div class="asset-category">${cat}</div><div class="asset-grid">`;
      ASSETS.filter(a => a.cat === cat).forEach(a => {
        html += `<div class="asset-item" data-asset="${a.id}" onpointerdown="startAssetDrag(event,'${a.id}')" onclick="addAsset('${a.id}')"><svg viewBox="0 0 ${a.w} ${a.h}" xmlns="http://www.w3.org/2000/svg">${a.svg('#c4b5fd')}</svg><div class="aname">${a.name}</div></div>`;
      });
      html += '</div>';
    });
    panel.innerHTML = html;
  }
}

// ============================================================
// RIGHT PANEL
// ============================================================
function renderRightPanel() {
  const panel = document.getElementById('rightPanel');
  let html = '';
  html += `<div class="prop-section"><div class="prop-label">Background</div>`;
  html += `<div class="prop-row"><label>Color 1</label><input type="color" value="${S.bg.c1}" onchange="S.bg.c1=this.value;renderCanvas()"></div>`;
  html += `<div class="prop-row"><label>Color 2</label><input type="color" value="${S.bg.c2}" onchange="S.bg.c2=this.value;renderCanvas()"></div>`;
  html += `<div class="prop-row"><label>Angle</label><input type="range" min="0" max="360" value="${S.bg.angle}" oninput="S.bg.angle=+this.value;this.nextElementSibling.textContent=this.value+'°';renderCanvas()"><span class="val">${S.bg.angle}°</span></div>`;
  html += `</div>`;
  const sel = S.elements.find(e => e.id === S.selectedId);
  if (sel) {
    const a = getAsset(sel.type);
    html += `<div class="prop-section"><div class="prop-label"><span class="sel-indicator"></span>${a ? a.name : sel.type}</div>`;
    html += `<div class="prop-row"><label>Color</label><input type="color" value="${sel.color||'#ffffff'}" onchange="updateSel('color',this.value)"></div>`;
    html += `<div class="prop-row"><label>Opacity</label><input type="range" min="0" max="100" value="${Math.round((sel.opacity??1)*100)}" oninput="updateSel('opacity',this.value/100);this.nextElementSibling.textContent=this.value+'%'"><span class="val">${Math.round((sel.opacity??1)*100)}%</span></div>`;
    html += `<div class="prop-row"><label>Scale</label><input type="range" min="10" max="500" value="${Math.round((sel.scale||1)*100)}" oninput="updateSel('scale',this.value/100);this.nextElementSibling.textContent=(this.value/100).toFixed(1)+'x'"><span class="val">${(sel.scale||1).toFixed(1)}x</span></div>`;
    html += `<div class="prop-row"><label>Rotation</label><input type="range" min="-180" max="180" value="${sel.rot||0}" oninput="updateSel('rot',+this.value);this.nextElementSibling.textContent=this.value+'°'"><span class="val">${sel.rot||0}°</span></div>`;
    html += `<div class="prop-row"><label>X</label><input type="number" value="${Math.round(sel.x)}" onchange="updateSel('x',+this.value)"></div>`;
    html += `<div class="prop-row"><label>Y</label><input type="number" value="${Math.round(sel.y)}" onchange="updateSel('y',+this.value)"></div>`;
    html += `<div class="btn-row"><button class="btn-sm" onclick="duplicateSelected()">Duplicate</button><button class="btn-sm" onclick="bringForward()">Forward</button></div>`;
    html += `<div class="btn-row"><button class="btn-sm" onclick="sendBackward()">Backward</button><button class="btn-sm danger" onclick="deleteSelected()">Delete</button></div>`;
    html += `</div>`;
  } else {
    html += `<div class="prop-section"><div class="prop-label">Element</div><div class="empty-state"><div class="icon">⬚</div>${S.mode==='studio' ? 'Click an asset to add it,<br>or click an element on canvas to select it' : 'Click a preset to load it,<br>then switch to Studio to edit'}</div></div>`;
  }
  html += `<div class="prop-section"><div class="prop-label">Layers (${S.elements.length})</div><div class="layer-list">`;
  [...S.elements].reverse().forEach(el => {
    const a = getAsset(el.type);
    html += `<div class="layer-item ${el.id===S.selectedId?'selected':''}" onclick="selectElement(${el.id})"><svg class="li-icon" viewBox="0 0 ${a?a.w:20} ${a?a.h:20}" xmlns="http://www.w3.org/2000/svg">${a?a.svg('#c4b5fd'):''}</svg><span class="li-name">${a?a.name:el.type}</span><span class="li-vis" onclick="event.stopPropagation();toggleVis(${el.id})">${(el.opacity??1)>0?'👁':'◌'}</span></div>`;
  });
  html += `</div></div>`;
  panel.innerHTML = html;
}

function updateSel(prop, val) {
  const el = S.elements.find(e => e.id === S.selectedId);
  if (el) { el[prop] = val; renderCanvas(); }
}

// ============================================================
// INTERACTIONS
// ============================================================
function setMode(m) {
  S.mode = m;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === m));
  renderLeftPanel();
  renderRightPanel();
}

function setGalleryFilter(f) {
  S.galleryFilter = f;
  renderLeftPanel();
}

function loadPreset(i) {
  S.preset = i;
  const p = PRESETS[i];
  S.bg = { ...p.bg };
  S.elements = p.els.map(el => ({ ...el, id: S.nextId++ }));
  S.selectedId = null;
  renderCanvas();
  renderLeftPanel();
  renderRightPanel();
}

function selectElement(id) {
  S.selectedId = (S.selectedId === id) ? null : id;
  renderSelection();
  renderRightPanel();
}

function addAsset(assetId) {
  const a = getAsset(assetId);
  if (!a) return;
  const el = { id: S.nextId++, type: assetId, x: 256 - a.w/2, y: 256 - a.h/2, scale: 1.5, opacity: 0.9, color: '#ffffff', rot: 0 };
  S.elements.push(el);
  S.selectedId = el.id;
  renderCanvas();
  renderRightPanel();
}

function deleteSelected() {
  S.elements = S.elements.filter(e => e.id !== S.selectedId);
  S.selectedId = null;
  renderCanvas();
  renderRightPanel();
}

function duplicateSelected() {
  const el = S.elements.find(e => e.id === S.selectedId);
  if (!el) return;
  const dup = { ...el, id: S.nextId++, x: el.x + 20, y: el.y + 20 };
  S.elements.push(dup);
  S.selectedId = dup.id;
  renderCanvas();
  renderRightPanel();
}

function bringForward() {
  const idx = S.elements.findIndex(e => e.id === S.selectedId);
  if (idx < S.elements.length - 1) {
    [S.elements[idx], S.elements[idx+1]] = [S.elements[idx+1], S.elements[idx]];
    renderCanvas(); renderRightPanel();
  }
}
function sendBackward() {
  const idx = S.elements.findIndex(e => e.id === S.selectedId);
  if (idx > 0) {
    [S.elements[idx], S.elements[idx-1]] = [S.elements[idx-1], S.elements[idx]];
    renderCanvas(); renderRightPanel();
  }
}

function toggleVis(id) {
  const el = S.elements.find(e => e.id === id);
  if (el) { el.opacity = (el.opacity ?? 1) > 0 ? 0 : 1; renderCanvas(); renderRightPanel(); }
}

// Canvas click to select/deselect
document.getElementById('icon-canvas').addEventListener('pointerdown', function(e) {
  const svg = this;
  const pt = svg.createSVGPoint();
  pt.x = e.clientX; pt.y = e.clientY;
  const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
  let found = null;
  for (let i = S.elements.length - 1; i >= 0; i--) {
    const el = S.elements[i];
    const a = getAsset(el.type);
    if (!a) continue;
    const w = a.w * (el.scale||1), h = a.h * (el.scale||1);
    if (svgP.x >= el.x && svgP.x <= el.x + w && svgP.y >= el.y && svgP.y <= el.y + h) {
      found = el; break;
    }
  }
  if (found) {
    S.selectedId = found.id;
    S.dragging = found.id;
    S.dragOffset = { x: svgP.x - found.x, y: svgP.y - found.y };
    renderSelection();
    renderRightPanel();
  } else {
    S.selectedId = null;
    renderSelection();
    renderRightPanel();
  }
});

document.addEventListener('pointermove', function(e) {
  if (!S.dragging) return;
  const svg = document.getElementById('icon-canvas');
  const pt = svg.createSVGPoint();
  pt.x = e.clientX; pt.y = e.clientY;
  const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
  const el = S.elements.find(el => el.id === S.dragging);
  if (el) {
    el.x = svgP.x - S.dragOffset.x;
    el.y = svgP.y - S.dragOffset.y;
    renderCanvas();
  }
});

document.addEventListener('pointerup', function() {
  if (S.dragging) { S.dragging = null; renderRightPanel(); }
});

let assetDragGhost = null;
function startAssetDrag(e, assetId) {}

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (S.selectedId && !e.target.closest('input')) { deleteSelected(); }
  }
  if (e.key === 'Escape') { S.selectedId = null; renderSelection(); renderRightPanel(); }
  if (e.key === 'd' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); duplicateSelected(); }
});

// ============================================================
// EXPORT
// ============================================================
function exportPNG() {
  const svg = document.getElementById('icon-canvas');
  const data = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([data], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = function() {
    const canvas = document.getElementById('export-canvas');
    canvas.width = 1024; canvas.height = 1024;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 1024, 1024);
    ctx.drawImage(img, 0, 0, 1024, 1024);
    URL.revokeObjectURL(url);
    canvas.toBlob(function(b) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(b);
      a.download = 'dotViewer-icon-1024.png';
      a.click();
    }, 'image/png');
  };
  img.src = url;
}

function exportSVG() {
  const svg = document.getElementById('icon-canvas');
  const clone = svg.cloneNode(true);
  clone.setAttribute('width', '1024');
  clone.setAttribute('height', '1024');
  const data = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([data], { type: 'image/svg+xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dotViewer-icon.svg';
  a.click();
}

// ============================================================
// INIT
// ============================================================
loadPreset(0);
renderLeftPanel();
renderRightPanel();
</script>
