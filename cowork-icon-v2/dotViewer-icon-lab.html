<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dotViewer Icon Lab — Liquid Glass</title>
<style>
  :root {
    --bg-0: #0a0a0f;
    --bg-1: #12121a;
    --bg-2: #1a1a26;
    --bg-3: #222233;
    --border: rgba(255,255,255,0.06);
    --text-0: #f0f0f5;
    --text-1: #a0a0b8;
    --text-2: #66667a;
    --accent: #6366f1;
    --accent-soft: rgba(99,102,241,0.15);
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: var(--bg-0);
    color: var(--text-0);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .header h1 span { color: var(--accent); }
  .header-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .header-right { display: flex; gap: 8px; }
  .btn {
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--glass-border);
    background: var(--glass);
    color: var(--text-1);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn:hover { background: rgba(255,255,255,0.08); color: var(--text-0); }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: #5558e6; }

  /* ── Main Layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Left Panel: Assets ── */
  .panel-left {
    width: 280px;
    background: var(--bg-1);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-2);
  }
  .filter-tabs {
    display: flex;
    gap: 4px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    flex-shrink: 0;
  }
  .filter-tab {
    padding: 4px 10px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-2);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    transition: all 0.15s;
  }
  .filter-tab:hover { color: var(--text-1); background: var(--glass); }
  .filter-tab.active { color: var(--accent); background: var(--accent-soft); }
  .filter-count {
    font-size: 10px;
    opacity: 0.6;
    margin-left: 3px;
  }
  .asset-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    padding: 12px;
    overflow-y: auto;
    flex: 1;
  }
  .asset-card {
    aspect-ratio: 1;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: grab;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .asset-card:hover {
    border-color: var(--accent);
    background: var(--bg-3);
    transform: scale(1.02);
  }
  .asset-card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .asset-card svg { width: 52px; height: 52px; }
  .asset-label {
    font-size: 8px;
    color: var(--text-2);
    margin-top: 3px;
    text-align: center;
    line-height: 1.1;
    padding: 0 2px;
  }
  .asset-cat-badge {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  /* ── Center: Canvas ── */
  .panel-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  .canvas-toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-1);
    flex-shrink: 0;
  }
  .canvas-toolbar label {
    font-size: 11px;
    color: var(--text-2);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .canvas-toolbar input[type="color"] {
    width: 28px;
    height: 22px;
    border: 1px solid var(--glass-border);
    border-radius: 4px;
    background: var(--bg-2);
    cursor: pointer;
    padding: 1px;
  }
  .canvas-toolbar input[type="range"] {
    width: 80px;
    accent-color: var(--accent);
  }
  .canvas-toolbar input[type="number"] {
    width: 48px;
    background: var(--bg-2);
    border: 1px solid var(--glass-border);
    border-radius: 4px;
    color: var(--text-0);
    font-size: 11px;
    padding: 2px 6px;
    font-family: inherit;
  }
  .canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-0);
    background-image:
      radial-gradient(circle at 50% 50%, rgba(99,102,241,0.03) 0%, transparent 70%);
    position: relative;
    overflow: hidden;
  }
  .canvas-frame {
    position: relative;
    width: 512px;
    height: 512px;
    flex-shrink: 0;
  }
  .canvas-svg {
    width: 100%;
    height: 100%;
    border-radius: 22.37%;
    overflow: hidden;
    box-shadow:
      0 2px 8px rgba(0,0,0,0.3),
      0 12px 40px rgba(0,0,0,0.4);
  }
  /* Drag overlay for elements on canvas */
  .canvas-el {
    position: absolute;
    cursor: move;
    transition: outline 0.1s;
    outline: 2px solid transparent;
    outline-offset: 4px;
    border-radius: 4px;
  }
  .canvas-el:hover, .canvas-el.selected {
    outline-color: var(--accent);
  }

  /* ── Right Panel: Properties + Presets ── */
  .panel-right {
    width: 280px;
    background: var(--bg-1);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .right-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .right-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-2);
    background: transparent;
    border: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    font-family: inherit;
    transition: all 0.15s;
  }
  .right-tab:hover { color: var(--text-1); }
  .right-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .right-content {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
  }
  .prop-group {
    margin-bottom: 16px;
  }
  .prop-group-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-2);
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }
  .prop-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .prop-label {
    font-size: 11px;
    color: var(--text-1);
  }
  .prop-input {
    width: 80px;
    background: var(--bg-2);
    border: 1px solid var(--glass-border);
    border-radius: 4px;
    color: var(--text-0);
    font-size: 11px;
    padding: 3px 6px;
    font-family: inherit;
    text-align: right;
  }
  .prop-input-color {
    width: 32px;
    height: 24px;
    border: 1px solid var(--glass-border);
    border-radius: 4px;
    padding: 1px;
    background: var(--bg-2);
    cursor: pointer;
  }

  /* ── Layer List ── */
  .layer-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .layer-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: var(--radius-sm);
    background: var(--bg-2);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.1s;
    font-size: 11px;
    color: var(--text-1);
  }
  .layer-item:hover { background: var(--bg-3); }
  .layer-item.selected { border-color: var(--accent); color: var(--text-0); }
  .layer-thumb {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    background: var(--bg-3);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .layer-thumb svg { width: 20px; height: 20px; }
  .layer-name { flex: 1; }
  .layer-vis {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 1px solid var(--glass-border);
    background: transparent;
    color: var(--text-2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-family: inherit;
  }
  .layer-del {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-family: inherit;
  }
  .layer-del:hover { color: #f44; border-color: rgba(255,68,68,0.3); }

  /* ── Preset Gallery ── */
  .preset-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .preset-card {
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-2);
    cursor: pointer;
    transition: all 0.15s;
    overflow: hidden;
  }
  .preset-card:hover {
    border-color: var(--accent);
    transform: scale(1.02);
  }
  .preset-thumb {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .preset-thumb svg { width: 100%; height: 100%; border-radius: 22.37%; overflow: hidden; }
  .preset-info {
    padding: 4px 6px 6px;
  }
  .preset-name {
    font-size: 9px;
    font-weight: 500;
    color: var(--text-1);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .preset-badge {
    display: inline-block;
    font-size: 8px;
    padding: 1px 5px;
    border-radius: 4px;
    font-weight: 600;
    margin-right: 3px;
  }
  .preset-badge.liquid { background: rgba(99,102,241,0.15); color: #818cf8; }
  .preset-badge.hig { background: rgba(52,211,153,0.15); color: #34d399; }
  .preset-badge.concept { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .preset-badge.dotviewer { background: rgba(129,140,248,0.18); color: #818cf8; }

  /* ── Preview Row ── */
  .preview-row {
    display: flex;
    align-items: flex-end;
    gap: 16px;
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg-1);
    flex-shrink: 0;
    overflow-x: auto;
  }
  .preview-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .preview-icon {
    border-radius: 22.37%;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .preview-label {
    font-size: 9px;
    color: var(--text-2);
    font-weight: 500;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

  /* ── Empty State ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text-2);
    font-size: 12px;
    text-align: center;
    line-height: 1.6;
  }
  .empty-state-icon {
    font-size: 32px;
    margin-bottom: 8px;
    opacity: 0.4;
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════ HEADER -->
<div class="header">
  <div class="header-left">
    <h1>dotViewer <span>Icon Lab</span></h1>
    <span class="header-badge">LIQUID GLASS</span>
  </div>
  <div class="header-right">
    <button class="btn" onclick="resetCanvas()">Reset</button>
    <button class="btn" onclick="exportSVG()">Export SVG</button>
    <button class="btn btn-primary" onclick="exportPNG()">Export 1024px PNG</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ MAIN -->
<div class="main">

  <!-- ── Left Panel ── -->
  <div class="panel-left">
    <div class="panel-header">
      <span class="panel-title">Assets</span>
      <span style="font-size:11px;color:var(--text-2)" id="assetCount"></span>
    </div>
    <div class="filter-tabs" id="filterTabs"></div>
    <div class="asset-grid" id="assetGrid"></div>
  </div>

  <!-- ── Center Panel ── -->
  <div class="panel-center">
    <div class="canvas-toolbar">
      <label>BG 1 <input type="color" id="bgC1" value="#3730a3" onchange="updateBG()"></label>
      <label>BG 2 <input type="color" id="bgC2" value="#6366f1" onchange="updateBG()"></label>
      <label>Angle <input type="range" id="bgAngle" min="0" max="360" value="150" oninput="updateBG()"><span id="bgAngleVal" style="font-size:10px;color:var(--text-2);min-width:26px">150°</span></label>
      <div style="flex:1"></div>
      <label style="gap:4px">
        <span style="font-size:10px;color:var(--text-2)">Grid</span>
        <input type="checkbox" id="showGrid" onchange="renderCanvas()">
      </label>
    </div>
    <div class="canvas-area" id="canvasArea">
      <div class="canvas-frame" id="canvasFrame">
        <svg class="canvas-svg" id="canvasSVG" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <clipPath id="squircle">
              <rect width="512" height="512" rx="114" ry="114"/>
            </clipPath>
            <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#3730a3"/>
              <stop offset="100%" stop-color="#6366f1"/>
            </linearGradient>
          </defs>
          <g clip-path="url(#squircle)">
            <rect id="bgRect" width="512" height="512" fill="url(#bgGrad)"/>
            <!-- top highlight -->
            <ellipse cx="256" cy="80" rx="300" ry="130" fill="white" opacity="0.06"/>
            <g id="elementsGroup"></g>
            <!-- grid overlay -->
            <g id="gridOverlay" opacity="0"></g>
          </g>
        </svg>
      </div>
    </div>

    <!-- Preview Row -->
    <div class="preview-row" id="previewRow"></div>
  </div>

  <!-- ── Right Panel ── -->
  <div class="panel-right">
    <div class="right-tabs">
      <button class="right-tab active" onclick="switchRightTab('layers')" id="tabLayers">Layers</button>
      <button class="right-tab" onclick="switchRightTab('props')" id="tabProps">Properties</button>
      <button class="right-tab" onclick="switchRightTab('presets')" id="tabPresets">Presets</button>
    </div>
    <div class="right-content" id="rightContent"></div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
const S = {
  bg: { c1: '#3730a3', c2: '#6366f1', angle: 150 },
  elements: [],
  selectedId: null,
  assetFilter: 'all',
  rightTab: 'layers',
  dragInfo: null,
  nextId: 1
};

// ═══════════════════════════════════════════════════════════════════
// ASSETS — Liquid Glass SVG icon elements
// Each uses the 7-Layer Glass Formula from the HIG guide
// ═══════════════════════════════════════════════════════════════════
const ASSETS = [

  // ─── Eye / Lens Category ───
  { id:'liq_eye', name:'Glass Eye', cat:'Eye / Lens',
    catColor:'#60a5fa',
    w:80, h:84,
    svg: c => `
      <ellipse cx="40" cy="78" rx="30" ry="3.5" fill="${c}" opacity="0.06"/>
      <ellipse cx="40" cy="40" rx="36" ry="22" fill="${c}"/>
      <ellipse cx="40" cy="40" rx="33" ry="19" fill="white" fill-opacity="0.08"/>
      <circle cx="40" cy="40" r="14" fill="white" opacity="0.85"/>
      <circle cx="40" cy="40" r="8" fill="${c}" opacity="0.7"/>
      <circle cx="40" cy="40" r="4" fill="white" opacity="0.2"/>
      <ellipse cx="30" cy="30" rx="14" ry="7" fill="white" opacity="0.38" transform="rotate(-14,30,30)"/>
      <ellipse cx="44" cy="34" rx="6" ry="3.5" fill="white" opacity="0.16"/>
      <ellipse cx="26" cy="27" rx="3.5" ry="2" fill="white" opacity="0.11"/>
      <ellipse cx="40" cy="52" rx="22" ry="5" fill="black" opacity="0.04"/>
      <ellipse cx="40" cy="40" rx="36" ry="22" stroke="white" stroke-width="0.7" fill="none" opacity="0.13"/>
    ` },

  { id:'liq_mag', name:'Magnifier', cat:'Eye / Lens',
    catColor:'#60a5fa',
    w:80, h:86,
    svg: c => `
      <ellipse cx="34" cy="80" rx="24" ry="3" fill="${c}" opacity="0.06"/>
      <circle cx="32" cy="34" r="26" fill="${c}"/>
      <circle cx="32" cy="34" r="23" fill="white" fill-opacity="0.08"/>
      <line x1="50" y1="52" x2="72" y2="74" stroke="${c}" stroke-width="10" stroke-linecap="round"/>
      <line x1="50" y1="52" x2="72" y2="74" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.85"/>
      <circle cx="32" cy="34" r="16" fill="white" opacity="0.12"/>
      <ellipse cx="24" cy="24" rx="12" ry="8" fill="white" opacity="0.4" transform="rotate(-16,24,24)"/>
      <ellipse cx="38" cy="28" rx="5" ry="3" fill="white" opacity="0.16"/>
      <ellipse cx="20" cy="20" rx="3" ry="2" fill="white" opacity="0.1"/>
      <ellipse cx="32" cy="48" rx="16" ry="5" fill="black" opacity="0.04"/>
      <circle cx="32" cy="34" r="26" stroke="white" stroke-width="0.7" fill="none" opacity="0.12"/>
    ` },

  { id:'liq_lens', name:'Camera Lens', cat:'Eye / Lens',
    catColor:'#60a5fa',
    w:80, h:84,
    svg: c => `
      <ellipse cx="40" cy="78" rx="28" ry="3.5" fill="${c}" opacity="0.06"/>
      <circle cx="40" cy="40" r="36" fill="${c}"/>
      <circle cx="40" cy="40" r="32" fill="white" fill-opacity="0.06"/>
      <circle cx="40" cy="40" r="26" fill="${c}" opacity="0.6"/>
      <circle cx="40" cy="40" r="22" fill="white" fill-opacity="0.06"/>
      <circle cx="40" cy="40" r="14" fill="${c}" opacity="0.4"/>
      <circle cx="40" cy="40" r="8" fill="white" opacity="0.15"/>
      <ellipse cx="30" cy="26" rx="14" ry="9" fill="white" opacity="0.38" transform="rotate(-16,30,26)"/>
      <ellipse cx="46" cy="32" rx="6" ry="3.5" fill="white" opacity="0.15"/>
      <ellipse cx="26" cy="22" rx="3.5" ry="2" fill="white" opacity="0.1"/>
      <ellipse cx="40" cy="58" rx="22" ry="5" fill="black" opacity="0.04"/>
      <circle cx="40" cy="40" r="36" stroke="white" stroke-width="0.7" fill="none" opacity="0.12"/>
    ` },

  // ─── Dot Category ───
  { id:'liq_dot', name:'Glass Dot', cat:'Dot',
    catColor:'#a78bfa',
    w:80, h:84,
    svg: c => `
      <ellipse cx="40" cy="78" rx="24" ry="3.5" fill="${c}" opacity="0.06"/>
      <circle cx="40" cy="40" r="32" fill="${c}"/>
      <circle cx="40" cy="40" r="28" fill="white" fill-opacity="0.08"/>
      <ellipse cx="30" cy="26" rx="16" ry="10" fill="white" opacity="0.4" transform="rotate(-15,30,26)"/>
      <ellipse cx="46" cy="32" rx="7" ry="4.5" fill="white" opacity="0.16"/>

      { type:'dv_finder', x:76, y:36, scale:3.4, opacity:0.85, color:'#ffffff', rot:0 },
      { type:'dv_preview', x:116, y:120, scale:2.8, opacity:1, color:'#ffffff', rot:0 },
      { type:'liq_sparkle', x:320, y:46, scale:1.0, opacity:0.5, color:'#c4b5fd', rot:0 },
      { type:'dv_thedot', x:280, y:300, scale:1.6, opacity:0.7, color:'#818cf8', rot:0 }
    ]}
];


// ═══════════════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════════════

function getAsset(id) { return ASSETS.find(a => a.id === id); }
function getCategories() {
  const cats = new Set();
  ASSETS.forEach(a => cats.add(a.cat));
  return Array.from(cats);
}

function updateBG() {
  S.bg.c1 = document.getElementById('bgC1').value;
  S.bg.c2 = document.getElementById('bgC2').value;
  S.bg.angle = parseInt(document.getElementById('bgAngle').value);
  document.getElementById('bgAngleVal').textContent = S.bg.angle + '°';
  renderCanvas();
}

function renderCanvas() {
  const svg = document.getElementById('canvasSVG');
  const grad = svg.querySelector('#bgGrad');

  // Update gradient
  const a = S.bg.angle * Math.PI / 180;
  const x1 = 50 - Math.cos(a) * 50;
  const y1 = 50 - Math.sin(a) * 50;
  const x2 = 50 + Math.cos(a) * 50;
  const y2 = 50 + Math.sin(a) * 50;
  grad.setAttribute('x1', x1 + '%');
  grad.setAttribute('y1', y1 + '%');
  grad.setAttribute('x2', x2 + '%');
  grad.setAttribute('y2', y2 + '%');
  grad.querySelector('stop:first-child').setAttribute('stop-color', S.bg.c1);
  grad.querySelector('stop:last-child').setAttribute('stop-color', S.bg.c2);

  // Render elements
  const g = document.getElementById('elementsGroup');
  g.innerHTML = '';
  S.elements.forEach(el => {
    if (!el.visible) return;
    const asset = getAsset(el.type);
    if (!asset) return;
    const svgContent = asset.svg(el.color);
    const transform = `translate(${el.x},${el.y}) scale(${el.scale / (asset.w/80)}) rotate(${el.rot},${asset.w/2},${asset.h/2})`;
    g.innerHTML += `<g transform="${transform}" opacity="${el.opacity}">${svgContent}</g>`;
  });

  // Grid overlay
  const grid = document.getElementById('gridOverlay');
  const showGrid = document.getElementById('showGrid').checked;
  grid.setAttribute('opacity', showGrid ? '1' : '0');
  if (showGrid) {
    grid.innerHTML = `
      <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="0.5" opacity="0.1"/>
      <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="0.5" opacity="0.1"/>
      <circle cx="256" cy="256" r="180" stroke="white" stroke-width="0.5" fill="none" opacity="0.06"/>
      <rect x="77" y="77" width="358" height="358" rx="10" stroke="white" stroke-width="0.5" stroke-dasharray="4,4" fill="none" opacity="0.08"/>
    `;
  }

  renderPreviews();
}

function renderPreviews() {
  const sizes = [256, 128, 64, 32, 16];
  const row = document.getElementById('previewRow');
  row.innerHTML = '';
  sizes.forEach(sz => {
    const div = document.createElement('div');
    div.className = 'preview-item';
    const iconDiv = document.createElement('div');
    iconDiv.className = 'preview-icon';
    iconDiv.style.width = sz + 'px';
    iconDiv.style.height = sz + 'px';
    const svgEl = document.getElementById('canvasSVG');
    const clone = svgEl.cloneNode(true);
    clone.style.width = sz + 'px';
    clone.style.height = sz + 'px';
    clone.removeAttribute('id');
    clone.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
    iconDiv.appendChild(clone);
    const label = document.createElement('div');
    label.className = 'preview-label';
    label.textContent = sz + 'px';
    div.appendChild(iconDiv);
    div.appendChild(label);
    row.appendChild(div);
  });
}

// ═══════════════════════════════════════════════════════════════════
// LEFT PANEL — Asset Grid
// ═══════════════════════════════════════════════════════════════════

function renderAssetPanel() {
  const cats = getCategories();
  const tabs = document.getElementById('filterTabs');
  const allCount = ASSETS.length;
  let tabsHTML = `<button class="filter-tab ${S.assetFilter==='all'?'active':''}" onclick="setAssetFilter('all')">All<span class="filter-count">${allCount}</span></button>`;
  cats.forEach(cat => {
    const count = ASSETS.filter(a => a.cat === cat).length;
    tabsHTML += `<button class="filter-tab ${S.assetFilter===cat?'active':''}" onclick="setAssetFilter('${cat}')">${cat}<span class="filter-count">${count}</span></button>`;
  });
  tabs.innerHTML = tabsHTML;

  const grid = document.getElementById('assetGrid');
  const filtered = S.assetFilter === 'all' ? ASSETS : ASSETS.filter(a => a.cat === S.assetFilter);
  document.getElementById('assetCount').textContent = filtered.length + ' items';

  grid.innerHTML = filtered.map(a => {
    const thumbSVG = `<svg viewBox="0 0 ${a.w} ${a.h}" xmlns="http://www.w3.org/2000/svg">${a.svg('#94a3b8')}</svg>`;
    return `
      <div class="asset-card" ondblclick="addAssetToCanvas('${a.id}')" title="Double-click to add: ${a.name}">
        <span class="asset-cat-badge" style="background:${a.catColor}"></span>
        ${thumbSVG}
        <div class="asset-label">${a.name}</div>
      </div>
    `;
  }).join('');
}

function setAssetFilter(f) {
  S.assetFilter = f;
  renderAssetPanel();
}

function addAssetToCanvas(assetId) {
  const a = getAsset(assetId);
  if (!a) return;
  const el = {
    id: S.nextId++,
    type: assetId,
    name: a.name,
    x: 140,
    y: 120,
    scale: 2.8,
    opacity: 1,
    color: '#ffffff',
    rot: 0,
    visible: true
  };
  S.elements.push(el);
  S.selectedId = el.id;
  renderCanvas();
  renderRightPanel();
}

// ═══════════════════════════════════════════════════════════════════
// RIGHT PANEL
// ═══════════════════════════════════════════════════════════════════

function switchRightTab(tab) {
  S.rightTab = tab;
  document.querySelectorAll('.right-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  renderRightPanel();
}

function renderRightPanel() {
  const content = document.getElementById('rightContent');
  if (S.rightTab === 'layers') {
    renderLayersPanel(content);
  } else if (S.rightTab === 'props') {
    renderPropsPanel(content);
  } else if (S.rightTab === 'presets') {
    renderPresetsPanel(content);
  }
}

function renderLayersPanel(container) {
  if (S.elements.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">+</div>
        <div>Double-click an asset<br>to add it to the canvas</div>
      </div>
    `;
    return;
  }

  let html = '<div class="layer-list">';
  // Render in reverse (top layer first)
  for (let i = S.elements.length - 1; i >= 0; i--) {
    const el = S.elements[i];
    const asset = getAsset(el.type);
    const selected = el.id === S.selectedId;
    const thumbSVG = asset ? `<svg viewBox="0 0 ${asset.w} ${asset.h}" xmlns="http://www.w3.org/2000/svg">${asset.svg(el.color)}</svg>` : '';
    html += `
      <div class="layer-item ${selected?'selected':''}" onclick="selectElement(${el.id})">
        <div class="layer-thumb">${thumbSVG}</div>
        <span class="layer-name">${el.name}</span>
        <button class="layer-vis" onclick="event.stopPropagation();toggleVis(${el.id})" title="Toggle visibility">${el.visible ? '●' : '○'}</button>
        <button class="layer-del" onclick="event.stopPropagation();removeElement(${el.id})" title="Remove">×</button>
      </div>
    `;
  }
  html += '</div>';
  container.innerHTML = html;
}

function renderPropsPanel(container) {
  const el = S.elements.find(e => e.id === S.selectedId);
  if (!el) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">⚙</div>
        <div>Select a layer to<br>edit its properties</div>
      </div>
    `;
    return;
  }
  container.innerHTML = `
    <div class="prop-group">
      <div class="prop-group-title">Position</div>
      <div class="prop-row"><span class="prop-label">X</span><input class="prop-input" type="number" value="${el.x}" onchange="setProp(${el.id},'x',+this.value)"></div>
      <div class="prop-row"><span class="prop-label">Y</span><input class="prop-input" type="number" value="${el.y}" onchange="setProp(${el.id},'y',+this.value)"></div>
    </div>
    <div class="prop-group">
      <div class="prop-group-title">Transform</div>
      <div class="prop-row"><span class="prop-label">Scale</span><input class="prop-input" type="number" step="0.1" value="${el.scale}" onchange="setProp(${el.id},'scale',+this.value)"></div>
      <div class="prop-row"><span class="prop-label">Rotation</span><input class="prop-input" type="number" value="${el.rot}" onchange="setProp(${el.id},'rot',+this.value)"></div>
      <div class="prop-row"><span class="prop-label">Opacity</span><input class="prop-input" type="number" step="0.05" min="0" max="1" value="${el.opacity}" onchange="setProp(${el.id},'opacity',+this.value)"></div>
    </div>
    <div class="prop-group">
      <div class="prop-group-title">Appearance</div>
      <div class="prop-row"><span class="prop-label">Color</span><input class="prop-input-color" type="color" value="${el.color}" onchange="setProp(${el.id},'color',this.value)"></div>
    </div>
    <div class="prop-group">
      <div class="prop-group-title">Quick Scale</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        ${[1.0, 1.5, 2.0, 2.5, 3.0, 3.5, 4.0].map(s =>
          `<button class="btn" style="padding:3px 8px;font-size:10px" onclick="setProp(${el.id},'scale',${s})">${s}×</button>`
        ).join('')}
      </div>
    </div>
  `;
}

function renderPresetsPanel(container) {
  const groups = ['dotviewer', 'concept', 'liquid', 'hig'];
  let html = '';
  groups.forEach(group => {
    const groupPresets = PRESETS.filter(p => p.group === group);
    const label = group === 'dotviewer' ? 'dotViewer Features' : group === 'concept' ? 'dotViewer Concepts' : group === 'liquid' ? 'Liquid Glass' : 'HIG Style';
    html += `<div style="margin-bottom:12px"><div class="prop-group-title">${label}</div>`;
    html += '<div class="preset-grid">';
    groupPresets.forEach((p, pi) => {
      const idx = PRESETS.indexOf(p);
      html += `
        <div class="preset-card" onclick="loadPreset(${idx})" title="${p.name}">
          <div class="preset-thumb">${presetThumbSVG(p)}</div>
          <div class="preset-info">
            <span class="preset-badge ${p.group}">${p.group.toUpperCase()}</span>
            <span class="preset-name">${p.name}</span>
          </div>
        </div>
      `;
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function presetThumbSVG(preset) {
  const a = preset.bg.angle * Math.PI / 180;
  const x1 = 50 - Math.cos(a)*50;
  const y1 = 50 - Math.sin(a)*50;
  const x2 = 50 + Math.cos(a)*50;
  const y2 = 50 + Math.sin(a)*50;

  let elsSVG = '';
  preset.els.forEach(el => {
    const asset = getAsset(el.type);
    if (!asset) return;
    const svgContent = asset.svg(el.color);
    const transform = `translate(${el.x},${el.y}) scale(${el.scale / (asset.w/80)}) rotate(${el.rot||0},${asset.w/2},${asset.h/2})`;
    elsSVG += `<g transform="${transform}" opacity="${el.opacity}">${svgContent}</g>`;
  });

  return `<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <clipPath id="sq_${preset.name.replace(/\s/g,'')}"><rect width="512" height="512" rx="114"/></clipPath>
      <linearGradient id="bg_${preset.name.replace(/\s/g,'')}" x1="${x1}%" y1="${y1}%" x2="${x2}%" y2="${y2}%">
        <stop offset="0%" stop-color="${preset.bg.c1}"/>
        <stop offset="100%" stop-color="${preset.bg.c2}"/>
      </linearGradient>
    </defs>
    <g clip-path="url(#sq_${preset.name.replace(/\s/g,'')})">
      <rect width="512" height="512" fill="url(#bg_${preset.name.replace(/\s/g,'')})"/>
      <ellipse cx="256" cy="80" rx="300" ry="130" fill="white" opacity="0.06"/>
      ${elsSVG}
    </g>
  </svg>`;
}

// ═══════════════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════════════

function selectElement(id) {
  S.selectedId = id;
  renderRightPanel();
}

function setProp(id, key, val) {
  const el = S.elements.find(e => e.id === id);
  if (el) {
    el[key] = val;
    renderCanvas();
    // Don't re-render props panel to avoid losing focus
  }
}

function toggleVis(id) {
  const el = S.elements.find(e => e.id === id);
  if (el) {
    el.visible = !el.visible;
    renderCanvas();
    renderRightPanel();
  }
}

function removeElement(id) {
  S.elements = S.elements.filter(e => e.id !== id);
  if (S.selectedId === id) S.selectedId = null;
  renderCanvas();
  renderRightPanel();
}

function loadPreset(idx) {
  const p = PRESETS[idx];
  S.bg = { ...p.bg };
  document.getElementById('bgC1').value = p.bg.c1;
  document.getElementById('bgC2').value = p.bg.c2;
  document.getElementById('bgAngle').value = p.bg.angle;
  document.getElementById('bgAngleVal').textContent = p.bg.angle + '°';

  S.elements = p.els.map(el => ({
    id: S.nextId++,
    type: el.type,
    name: getAsset(el.type)?.name || el.type,
    x: el.x,
    y: el.y,
    scale: el.scale,
    opacity: el.opacity,
    color: el.color,
    rot: el.rot || 0,
    visible: true
  }));
  S.selectedId = null;
  renderCanvas();
  switchRightTab('layers');
}

function resetCanvas() {
  S.elements = [];
  S.selectedId = null;
  S.bg = { c1: '#3730a3', c2: '#6366f1', angle: 150 };
  document.getElementById('bgC1').value = '#3730a3';
  document.getElementById('bgC2').value = '#6366f1';
  document.getElementById('bgAngle').value = 150;
  document.getElementById('bgAngleVal').textContent = '150°';
  renderCanvas();
  renderRightPanel();
}

// ═══════════════════════════════════════════════════════════════════
// DRAG — Move elements on canvas
// ═══════════════════════════════════════════════════════════════════

const canvasArea = document.getElementById('canvasArea');
const canvasFrame = document.getElementById('canvasFrame');

canvasFrame.addEventListener('mousedown', e => {
  if (!S.selectedId) return;
  const rect = canvasFrame.getBoundingClientRect();
  const scaleX = 512 / rect.width;
  const scaleY = 512 / rect.height;
  const el = S.elements.find(e2 => e2.id === S.selectedId);
  if (!el) return;

  const startX = e.clientX;
  const startY = e.clientY;
  const origX = el.x;
  const origY = el.y;

  function onMove(ev) {
    const dx = (ev.clientX - startX) * scaleX;
    const dy = (ev.clientY - startY) * scaleY;
    el.x = Math.round(origX + dx);
    el.y = Math.round(origY + dy);
    renderCanvas();
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    renderRightPanel();
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

// ═══════════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════════════

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const el = S.elements.find(e2 => e2.id === S.selectedId);

  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (el) { removeElement(el.id); e.preventDefault(); }
  }
  if (e.key === 'ArrowUp') { if(el){el.y-=(e.shiftKey?10:1); renderCanvas(); renderRightPanel();} e.preventDefault(); }
  if (e.key === 'ArrowDown') { if(el){el.y+=(e.shiftKey?10:1); renderCanvas(); renderRightPanel();} e.preventDefault(); }
  if (e.key === 'ArrowLeft') { if(el){el.x-=(e.shiftKey?10:1); renderCanvas(); renderRightPanel();} e.preventDefault(); }
  if (e.key === 'ArrowRight') { if(el){el.x+=(e.shiftKey?10:1); renderCanvas(); renderRightPanel();} e.preventDefault(); }
  if (e.key === '+' || e.key === '=') { if(el){el.scale=Math.round((el.scale+0.1)*10)/10; renderCanvas(); renderRightPanel();} }
  if (e.key === '-') { if(el){el.scale=Math.max(0.1,Math.round((el.scale-0.1)*10)/10); renderCanvas(); renderRightPanel();} }
});

// ═══════════════════════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════════════════════

function exportPNG() {
  const svgEl = document.getElementById('canvasSVG');
  const svgData = new XMLSerializer().serializeToString(svgEl);
  const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);

  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = 1024;
    canvas.height = 1024;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, 1024, 1024);
    URL.revokeObjectURL(url);

    canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'icon-1024.png';
      a.click();
      URL.revokeObjectURL(a.href);
    }, 'image/png');
  };
  img.src = url;
}

function exportSVG() {
  const svgEl = document.getElementById('canvasSVG');
  const svgData = new XMLSerializer().serializeToString(svgEl);
  const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'icon.svg';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════

renderAssetPanel();
renderCanvas();
renderRightPanel();

// Load first preset by default
loadPreset(0);
switchRightTab('presets');
setTimeout(() => switchRightTab('layers'), 100);
</script>
